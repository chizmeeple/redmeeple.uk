<meta charset="utf-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1"
/>
<script>
  (function () {
    var t = localStorage.getItem("theme");
    document.documentElement.setAttribute(
      "data-theme",
      t === "light" ? "light" : "dark",
    );
  })();
</script>
{% if page.title %}
<title>{{ page.title }} | {{ site.title }}</title>
{% else %}
<title>{{ site.title }}</title>
{% endif %}
{% if page.description %}
<meta name="description" content="{{ page.description | strip_html | truncate: 160 }}" />
{% else %}
<meta name="description" content="{{ site.description | strip_html | truncate: 160 }}" />
{% endif %}
<link
  rel="icon"
  type="image/png"
  href="{{ '/assets/chizmeeple-250x250.png' | relative_url }}"
/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
  rel="stylesheet"
/>
<link
  rel="stylesheet"
  href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}"
/>
{% seo title=false %}
