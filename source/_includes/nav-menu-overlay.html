<div class="nav-menu-overlay" id="nav-menu-dropdown" aria-hidden="true">
  <button
    type="button"
    class="nav-theme-toggle nav-menu-overlay__item"
    aria-label="Switch to light theme"
    title="Switch to light theme"
  >
    <span class="nav-theme-icon-slot" aria-hidden="true">
      <span class="iconify" data-icon="lucide:moon" aria-hidden="true"></span>
    </span>
    <span>Theme</span>
  </button>
  {% if site.repository %}
  <a
    href="https://github.com/{{ site.repository }}"
    target="_blank"
    rel="noopener"
    class="nav-menu-overlay__link"
    aria-label="GitHub"
  >
    <span class="iconify" data-icon="lucide:github" aria-hidden="true"></span>
    <span>GitHub</span>
  </a>
  {% endif %}
</div>
