---
name: Assign Issue

on:
  issues:
    types: [opened]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-assign issue
        uses: pozil/auto-assign-issue@v3
        with:
          assignees: chizmeeple
          numOfAssignee: 1
          allowSelfAssign: true
